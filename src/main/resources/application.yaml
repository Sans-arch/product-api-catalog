spring:
  application:
    name: product-catalog-api
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 2000 # 20 seconds
      idle-timeout: 300000 # 5 minutes

  jpa:
    hibernate:
      ddl-auto: update # Hibernate creates/updates the schema automatically
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false # also silence that warning from your logs

  data:
    redis:
      host: localhost
      port: 6379